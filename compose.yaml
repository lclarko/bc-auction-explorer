services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bc_auction
      POSTGRES_USER: bc_auction
      POSTGRES_PASSWORD: bc_auction
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bc_auction -d bc_auction"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
