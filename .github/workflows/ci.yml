name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: bc_auction
          POSTGRES_PASSWORD: bc_auction
          POSTGRES_USER: bc_auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bc_auction -d bc_auction"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BC_AUCTION_DATABASE_URL: postgresql+psycopg://bc_auction:bc_auction@localhost:5432/bc_auction
      BC_AUCTION_TEST_DATABASE_URL: postgresql+psycopg://bc_auction:bc_auction@localhost:5432/bc_auction_test
      PGPASSWORD: bc_auction
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: psql -h localhost -U bc_auction -d bc_auction -c 'CREATE DATABASE bc_auction_test'
      - run: alembic upgrade head
      - run: pytest
      - run: ruff check .
      - run: mypy src

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install -e .
      - run: npm ci
        working-directory: frontend
      - run: npm run check:api-types
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
