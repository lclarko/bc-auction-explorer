name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: bc_auction
          POSTGRES_PASSWORD: bc_auction
          POSTGRES_USER: bc_auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bc_auction -d bc_auction"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BC_AUCTION_DATABASE_URL: postgresql+psycopg://bc_auction:bc_auction@localhost:5432/bc_auction
      BC_AUCTION_TEST_DATABASE_URL: postgresql+psycopg://bc_auction:bc_auction@localhost:5432/bc_auction_test
      PGPASSWORD: bc_auction
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: psql -h localhost -U bc_auction -d bc_auction -c 'CREATE DATABASE bc_auction_test'
      - run: alembic upgrade head
      - run: pytest
      - run: ruff check .
      - run: mypy src

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install -e .
      - run: npm ci
        working-directory: frontend
      - run: npm run check:api-types
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
